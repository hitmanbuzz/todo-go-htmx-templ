#:schema https://json.schemastore.org/any.json

env_files = []
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "templ generate && npx @tailwindcss/cli -i ./assets/css/input.css -o ./assets/css/output.css --content \"./components/**/*.templ,./**/*.html\" && go build -o ./tmp/main ."
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "node_modules"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html", "templ", "css"]
  kill_delay = "0s"
  log = "build-errors.log"
  pre_cmd = []
  post_cmd = []
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  mode = ""
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  app_start_timeout = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
